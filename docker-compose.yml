services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://Dkrisztan:menny-test-2026@postgres:5432/postgres
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-Dkrisztan}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-menny-test-2026}
      - MINIO_BUCKET=menny-uploads
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-Menny* <krisztidancs@gmail.com>}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-menny-admin-super-secret-key-2026-xyz}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - ADMIN_URL=${ADMIN_URL:-http://localhost:3001}
      - PORT=3000
      - ADMIN_PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: Dkrisztan
      POSTGRES_PASSWORD: menny-test-2026
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Dkrisztan"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: Dkrisztan
      MINIO_ROOT_PASSWORD: menny-test-2026
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
