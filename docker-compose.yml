services:
  app:
    build: .
    expose:
      - "3000"
      - "3001"
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certbot-webroot:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped
